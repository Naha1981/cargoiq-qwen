name: Keep Render Warm
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake CargoIQ worker
        run: |
          echo "Pinging worker at $WORKER_URL"
          curl -sS -o /dev/null -w "worker_http=%{http_code}\n" "${WORKER_URL}/wake" || true
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
      - name: Wake Evolution API (optional)
        run: |
          curl -sS -o /dev/null -w "evolution_http=%{http_code}\n" "${EVOLUTION_API_URL}/" || true
        env:
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
