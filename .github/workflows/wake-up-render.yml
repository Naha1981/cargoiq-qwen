name: Wake Up Render Free Tier

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CargoIQ Worker
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://cargoiq-worker.onrender.com/wake || true

      - name: Ping Evolution API
        run: |
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.EVOLUTION_API_URL }}/health || true
